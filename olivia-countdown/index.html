  <style>
    @font-face {
      font-family: 'JustLikeHeaven';
      src: url('fonts/just-like-heaven.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(
        175deg,
        #c2e3f5 0%,
        #94c6e5 28%,
        #7db9de 58%,
        #93c6e8 82%,
        #aad3ed 100%
      );
      font-family: 'Jost', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Warm blush glow rising from the bottom — ties the pink palette in */
    body::before {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(to top, rgba(245, 200, 218, 0.28) 0%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Soft sun halo, top-right */
    body::after {
      content: '';
      position: fixed;
      top: -110px; right: -110px;
      width: 440px; height: 440px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(205,232,252,0.09) 50%, transparent 72%);
      pointer-events: none;
      z-index: 1;
    }

    /* ─── Swing: centred background element ─── */
    /*
      Positioned at the top-centre so the ropes appear to
      hang from the top of the viewport — the seat sits in
      the lower half of the page, right behind the countdown.
      Low opacity makes it atmospheric rather than decorative.
    */
    .swing-wrap {
      position: fixed;
      top: 0;
      left: 50%;
      width: clamp(140px, 20vw, 260px);
      transform-origin: 50% 0%;
      z-index: 2;
      opacity: 0.17;
      animation: sway 5.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite alternate;
    }

    @keyframes sway {
      0%   { transform: translateX(-52%) rotate(-9deg); }
      100% { transform: translateX(-52%) rotate(9deg); }
    }

    /* ─── Particles ─── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      animation: rise linear infinite;
    }

    @keyframes rise {
      0%   { opacity: 0; transform: translateY(105vh) translateX(0); }
      10%  { opacity: 1; }
      88%  { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-8vh) translateX(var(--drift, 20px)); }
    }

    /* ─── Clouds ─── */
    .cloud {
      position: fixed;
      background: rgba(255, 255, 255, 0.32);
      border-radius: 100px;
      filter: blur(20px);
      animation: cloud-drift linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes cloud-drift {
      from { transform: translateX(-300px); }
      to   { transform: translateX(calc(100vw + 300px)); }
    }

    /* ─── Page layout ─── */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 840px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Artist label ── */
    .artist {
      font-weight: 200;
      font-size: 0.82rem;
      letter-spacing: 0.52em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: enter 1s ease 0.15s forwards;
    }

    /* ── Album title ── */
    /*
      Both lines now share the same colour — previously l2 had
      a dimmed tint which created an unintentional hierarchy
      within the title itself.
    */
    .album-title {
      font-family: 'JustLikeHeaven', serif;
      font-style: normal;
      font-weight: normal;
      color: rgba(255, 252, 254, 0.96);
      text-shadow:
        0 2px 22px rgba(100, 165, 215, 0.4),
        0 0 45px rgba(255, 255, 255, 0.12);
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: enter 1s ease 0.35s forwards;
    }

    .album-title .l1 {
      display: block;
      font-size: clamp(2.8rem, 8.5vw, 6rem);
      line-height: 1.08;
    }

    .album-title .l2 {
      display: block;
      font-size: clamp(2rem, 5.8vw, 4.2rem);
      line-height: 1.14;
      /* Matches l1 colour — no separate opacity override */
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      width: 140px;
      margin-bottom: 1.1rem;
      opacity: 0;
      animation: enter 1s ease 0.5s forwards;
    }

    .divider-line {
      flex: 1;
      height: 1px;
    }

    .divider-line:first-child {
      background: linear-gradient(90deg, transparent, rgba(255, 195, 215, 0.55));
    }

    .divider-line:last-child {
      background: linear-gradient(90deg, rgba(255, 195, 215, 0.55), transparent);
    }

    .divider-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255, 195, 215, 0.65);
      flex-shrink: 0;
    }

    /* ── Release info ── */
    .release-info {
      font-weight: 300;
      font-size: 0.82rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 2rem;
      opacity: 0;
      animation: enter 1s ease 0.62s forwards;
    }

    /* ─── Countdown section ─── */
    /*
      The countdown-wrap fades in as a unit.
      The card groups the numbers visually so they feel
      anchored on the page rather than floating.
    */
    #countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      opacity: 0;
      animation: enter 1s ease 0.78s forwards;
    }

    .countdown-card {
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 20px;
      padding: 2.4rem 2rem 2.2rem;
      margin-bottom: 1rem;
      width: 100%;
      max-width: 800px;
    }

    .countdown {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(0.6rem, 2vw, 2rem);
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Countdown numbers use Jost 200 — consistent with the
       overall type system, and elegantly thin at large scale */
    .num {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: clamp(3rem, 5.5vw, 5rem);
      line-height: 0.92;
      color: #ffffff;
      letter-spacing: -0.02em;
      text-shadow:
        0 0 28px rgba(255, 210, 228, 0.48),
        0 2px 14px rgba(70, 135, 185, 0.22);
    }

    .colon {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: clamp(2.2rem, 4vw, 3.8rem);
      color: rgba(255, 210, 228, 0.52);
      line-height: 0.92;
      padding-bottom: 0.55rem;
      animation: blink 2s ease-in-out infinite alternate;
    }

    @keyframes blink {
      0%   { opacity: 0.4; }
      100% { opacity: 0.88; }
    }

    /* Labels: bumped up in size and opacity so they're
       clearly readable without competing with the numbers */
    .lbl {
      font-weight: 300;
      font-size: 0.74rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.58);
      margin-top: 0.7rem;
    }

    /* Local time sits just below the card, clearly associated */
    .local-time {
      font-weight: 200;
      font-size: 0.76rem;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.55);
    }

    /* ── Released state ── */
    #released {
      display: none;
      font-family: 'JustLikeHeaven', serif;
      font-weight: normal;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      color: rgba(255, 252, 254, 0.96);
      text-shadow: 0 2px 28px rgba(255, 200, 220, 0.58);
      margin-bottom: 1.5rem;
      animation: enter 1.2s ease forwards;
    }

    /* ─── Shared entrance animation ─── */
    @keyframes enter {
      from { opacity: 0; transform: translateY(13px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Mobile ─── */
    @media (max-width: 520px) {
      .countdown-card { padding: 1.6rem 1.2rem 1.4rem; border-radius: 16px; }
      .colon { padding-bottom: 0.38rem; }
    }
  </style>
</head>
<body>

  <!-- Swing hangs from the top of the viewport, centred behind the content -->
  <div class="swing-wrap" aria-hidden="true">
    <svg viewBox="0 0 120 400" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Ropes -->
      <line x1="42" y1="0" x2="33" y2="326" stroke="white" stroke-width="1.5"/>
      <line x1="78" y1="0" x2="87" y2="326" stroke="white" stroke-width="1.5"/>
      <!-- Seat -->
      <rect x="23" y="324" width="74" height="12" rx="4.5" fill="white"/>
    </svg>
  </div>

  <!-- Main content -->
  <div class="container">

    <p class="artist">Olivia Rodrigo</p>

    <h1 class="album-title">
      <span class="l1">you seem pretty sad</span>
      <span class="l2">for a girl so in love</span>
    </h1>

    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <p class="release-info">New Album &nbsp;·&nbsp; 12 June 2026</p>

    <div id="countdown-wrap">
      <div class="countdown-card">
        <div class="countdown" role="timer" aria-live="polite" aria-label="Countdown to album release">
          <div class="unit">
            <span class="num" id="d">00</span>
            <span class="lbl">Days</span>
          </div>
          <span class="colon" aria-hidden="true">:</span>
          <div class="unit">
            <span class="num" id="h">00</span>
            <span class="lbl">Hours</span>
          </div>
          <span class="colon" aria-hidden="true">:</span>
          <div class="unit">
            <span class="num" id="m">00</span>
            <span class="lbl">Mins</span>
          </div>
          <span class="colon" aria-hidden="true">:</span>
          <div class="unit">
            <span class="num" id="s">00</span>
            <span class="lbl">Secs</span>
          </div>
        </div>
      </div>
      <p class="local-time">midnight ET &nbsp;·&nbsp; 2:00 pm AEST &nbsp;·&nbsp; Friday 12 June</p>
    </div>

    <div id="released" aria-live="polite">it's here &nbsp;♡&nbsp; stream it now</div>

  </div>

  <script>
    // Midnight ET 12 June 2026 = 04:00:00 UTC (EDT = UTC−4)
    const release = new Date('2026-06-12T04:00:00Z');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const diff = release - Date.now();
      if (diff <= 0) {
        document.getElementById('countdown-wrap').style.display = 'none';
        document.getElementById('released').style.display = 'block';
        return;
      }
      document.getElementById('d').textContent = pad(Math.floor(diff / 86400000));
      document.getElementById('h').textContent = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('m').textContent = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('s').textContent = pad(Math.floor((diff % 60000) / 1000));
    }

    tick();
    setInterval(tick, 1000);

    // ── Particles: fewer, smaller, always blurred ──
    const pColors = [
      'rgba(255, 235, 243, 0.62)',
      'rgba(255, 255, 255, 0.58)',
      'rgba(215, 235, 252, 0.52)',
      'rgba(255, 215, 230, 0.48)',
    ];

    for (let i = 0; i < 14; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      const sz    = Math.random() * 6 + 3;         // 3–9 px
      const drift = (Math.random() - 0.5) * 70;    // gentle horizontal wander
      Object.assign(el.style, {
        width:             `${sz}px`,
        height:            `${sz}px`,
        left:              `${Math.random() * 100}vw`,
        background:        pColors[Math.floor(Math.random() * pColors.length)],
        animationDuration: `${Math.random() * 20 + 15}s`,  // slow drift
        animationDelay:    `${Math.random() * 24}s`,
        filter:            `blur(${Math.random() * 2.5 + 1.2}px)`, // always noticeably soft
        '--drift':         `${drift}px`,
      });
      document.body.appendChild(el);
    }

    // ── Clouds: slower, more transparent ──
    for (let i = 0; i < 4; i++) {
      const el = document.createElement('div');
      el.className = 'cloud';
      const w = Math.random() * 170 + 90;
      const h = Math.random() * 48 + 24;
      Object.assign(el.style, {
        width:             `${w}px`,
        height:            `${h}px`,
        top:               `${Math.random() * 38 + 5}%`,
        animationDuration: `${Math.random() * 110 + 90}s`,
        animationDelay:    `-${Math.random() * 110}s`,
        opacity:           `${Math.random() * 0.24 + 0.1}`,
      });
      document.body.appendChild(el);
    }
  </script>
</body>
</html>
