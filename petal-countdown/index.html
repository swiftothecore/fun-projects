    <title>petal – ariana grande – countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:wght@400;500&family=Raleway:wght@100;200;300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:         #0d0c0b;
            --white:      #f0ece6;
            --grey-light: #b8b3ac;
            --grey-mid:   #6e6a65;
            --grey-dark:  #272420;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Vignette */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(
                ellipse 70% 70% at 50% 45%,
                transparent 40%,
                rgba(0, 0, 0, 0.7) 100%
            );
            pointer-events: none;
            z-index: 1;
        }

        /* Texture canvas sits behind everything */
        #texture-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            object-fit: cover;
        }

        /* Petals */
        #petals {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -8vh;
            will-change: transform, opacity;
            animation: petalFall linear infinite;
        }

        @keyframes petalFall {
            0%   { transform: translateY(0) translateX(0px) rotate(0deg); opacity: 0; }
            8%   { opacity: var(--op); }
            38%  { transform: translateY(38vh) translateX(var(--dx1)) rotate(115deg); }
            72%  { transform: translateY(74vh) translateX(var(--dx2)) rotate(265deg); opacity: var(--op); }
            100% { transform: translateY(115vh) translateX(var(--dx1)) rotate(400deg); opacity: 0; }
        }

        /* Layout */
        .wrapper {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 880px;
            padding: 5rem 3rem 4.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .wrapper > * {
            animation: enter 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes enter {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .artist {
            font-family: 'Raleway', sans-serif;
            font-weight: 200;
            font-size: 0.68rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: var(--grey-light);
            margin-bottom: 0.5rem;
            animation-delay: 0.2s;
        }

        .album-svg {
            width: 100%;
            max-width: 480px;
            color: var(--white);
            margin-bottom: 2rem;
            animation-delay: 0.38s;
        }

        /* Countdown */
        .countdown-wrap {
            width: 100%;
            animation-delay: 0.56s;
        }

        /* Numbers and dots in their own row — align-items: center means dots always sit at the exact midpoint of the digits */
        .countdown-nums {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Labels in a separate row below, mirroring the column widths */
        .countdown-lbls {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            margin-top: 0.6rem;
        }

        .time-block {
            flex: 1 1 0;
            min-width: 0;
            text-align: center;
        }

        /* Invisible spacer in the labels row — same flex width as a sep, but zero height */
        .sep-spacer {
            flex-shrink: 0;
            visibility: hidden;
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6.5vw, 5rem);
            padding: 0 0.3rem;
            height: 0;
            overflow: hidden;
        }

        .sep {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: clamp(2rem, 6.5vw, 5rem);
            color: var(--grey-dark);
            flex-shrink: 0;
            user-select: none;
            padding: 0 0.3rem;
            line-height: 1;
        }

        .time-num {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: clamp(2.8rem, 10vw, 7.5rem);
            line-height: 1.1;
            color: var(--white);
            font-variant-numeric: lining-nums tabular-nums;
            letter-spacing: 0.01em;
            display: block;
        }

        .time-lbl {
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 0.48rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--grey-mid);
            display: block;
        }

        .released {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--white);
            letter-spacing: 0.08em;
            animation: enter 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Release date */
        .release-text {
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 0.6rem;
            letter-spacing: 0.55em;
            text-transform: uppercase;
            color: var(--grey-mid);
            margin-top: 3rem;
            animation-delay: 0.72s;
        }

        @media (max-width: 560px) {
            .wrapper { padding: 3.5rem 1.5rem 3rem; }
            .sep, .sep-spacer { font-size: 1.8rem; }
            .time-lbl { font-size: 0.4rem; letter-spacing: 0.3em; }
        }

        @media (max-width: 380px) {
            .sep { display: none; }
            .sep-spacer { display: none; }
        }
    </style>
</head>

    <script>
        // ── Canvas texture ────────────────────────────────────────────────────
        // Multi-octave smooth value noise — replicates the dark velvet/concrete look
        (function generateTexture() {
            const canvas = document.getElementById('texture-canvas');
            // Render at half resolution for speed, CSS scales it to cover
            const W = Math.ceil(window.innerWidth  / 2);
            const H = Math.ceil(window.innerHeight / 2);
            canvas.width  = W;
            canvas.height = H;

            const ctx = canvas.getContext('2d');

            // Build a grid of random values for one noise octave
            function makeGrid(cols, rows) {
                const g = [];
                for (let y = 0; y <= rows + 1; y++) {
                    g[y] = new Float32Array(cols + 2);
                    for (let x = 0; x <= cols + 1; x++) g[y][x] = Math.random();
                }
                return g;
            }

            // Bilinear interpolation with smoothstep
            function sample(grid, scale, px, py) {
                const gx = px / scale, gy = py / scale;
                const x0 = gx | 0, y0 = gy | 0;
                const fx = gx - x0, fy = gy - y0;
                const sx = fx * fx * (3 - 2 * fx);
                const sy = fy * fy * (3 - 2 * fy);
                return (
                    grid[y0    ][x0    ] * (1 - sx) * (1 - sy) +
                    grid[y0    ][x0 + 1] *      sx  * (1 - sy) +
                    grid[y0 + 1][x0    ] * (1 - sx) *      sy  +
                    grid[y0 + 1][x0 + 1] *      sx  *      sy
                );
            }

            // Three octaves: large cloud-like swells, mid variation, fine grain
            const S1 = 120, g1 = makeGrid(Math.ceil(W / S1), Math.ceil(H / S1));
            const S2 = 45,  g2 = makeGrid(Math.ceil(W / S2), Math.ceil(H / S2));
            const S3 = 14,  g3 = makeGrid(Math.ceil(W / S3), Math.ceil(H / S3));

            const imgData = ctx.createImageData(W, H);
            const d = imgData.data;

            // Base colour — very dark warm charcoal
            const BR = 14, BG = 13, BB = 11;

            for (let py = 0; py < H; py++) {
                for (let px = 0; px < W; px++) {
                    const n =
                        (sample(g1, S1, px, py) - 0.5) * 18 +
                        (sample(g2, S2, px, py) - 0.5) *  7 +
                        (sample(g3, S3, px, py) - 0.5) *  3;

                    const v = n | 0;
                    const i = (py * W + px) * 4;
                    d[i]     = Math.max(0, Math.min(255, BR + v));
                    d[i + 1] = Math.max(0, Math.min(255, BG + v));
                    d[i + 2] = Math.max(0, Math.min(255, BB + v));
                    d[i + 3] = 255;
                }
            }

            ctx.putImageData(imgData, 0, 0);
        })();


        const RELEASE = new Date('2026-07-31T04:00:00Z');

        const els = {
            days:    document.getElementById('days'),
            hours:   document.getElementById('hours'),
            minutes: document.getElementById('minutes'),
            seconds: document.getElementById('seconds'),
            wrap:    document.getElementById('countdown'),
        };

        function pad(n) {
            return String(Math.max(0, Math.floor(n))).padStart(2, '0');
        }

        function tick() {
            const diff = RELEASE - Date.now();
            if (diff <= 0) {
                els.wrap.innerHTML = '<span class="released">petal is here &nbsp;ꕤ</span>';
                return;
            }
            els.days.textContent    = pad(diff / 86400000);
            els.hours.textContent   = pad((diff % 86400000) / 3600000);
            els.minutes.textContent = pad((diff % 3600000)  / 60000);
            els.seconds.textContent = pad((diff % 60000)    / 1000);
        }

        tick();
        setInterval(tick, 1000);

        // Falling petals
        const container = document.getElementById('petals');

        function rand(min, max) { return min + Math.random() * (max - min); }

        function makePetal() {
            const el     = document.createElement('div');
            el.className = 'petal';

            const size    = rand(7, 18);
            const aspect  = rand(2.0, 2.8);
            const opacity = rand(0.04, 0.17);
            const left    = rand(0, 100);
            const dur     = rand(16, 34);
            const delay   = -rand(0, dur);
            const dx1     = rand(-60, 60).toFixed(1) + 'px';
            const dx2     = rand(-60, 60).toFixed(1) + 'px';

            const rx = (rand(0.35, 0.48) * size).toFixed(2);
            const ry = (rand(0.42, 0.50) * size * aspect).toFixed(2);
            const cx = (size / 2).toFixed(2);
            const cy = (size * aspect / 2).toFixed(2);
            const w  = size.toFixed(2);
            const h  = (size * aspect).toFixed(2);

            el.innerHTML = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"
                xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"
                    fill="rgba(240,236,230,${opacity})"/>
            </svg>`;

            el.style.cssText = `
                left: ${left}%;
                --op: ${opacity};
                --dx1: ${dx1};
                --dx2: ${dx2};
                animation-name: petalFall;
                animation-duration: ${dur}s;
                animation-delay: ${delay}s;
            `;

            container.appendChild(el);
        }

        for (let i = 0; i < 20; i++) makePetal();
    </script>
